services:
  postgres:
    image: postgres:16-alpine
    container_name: meicompleto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-meicompleto}
      POSTGRES_USER: ${DB_USER:-meicompleto}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-meicompleto}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meicompleto_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: meicompleto_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-meicompleto}:${DB_PASS}@postgres:5432/${DB_NAME:-meicompleto}
      REDIS_URL: redis://:${REDIS_PASS}@redis:6379
      MIGRATIONS_DIR: /app/db/migrations
    ports:
      - "4001:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://10.0.111.7:4000}
        VITE_APP_URL: ${VITE_APP_URL:-http://10.0.111.7:3000}
    container_name: meicompleto_frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
    name: meicompleto_internal

volumes:
  postgres_data:
